<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f4ef" />
    <meta name="description" content="Inventario y estado de impresoras" />
    <link rel="icon" type="image/png" href="/pms-logo.png" />
    <title>PMS · Control de suministros</title>
    <script>
      // Fija el tema antes de pintar, para que no haya parpadeo (flash) del tema equivocado.
      (function () {
        try {
          var pref = localStorage.getItem('pms-theme') || 'system'
          var dark = pref === 'dark' || (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
